services:
  - type: web
    name: cv-intelligence
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: EPHEMERAL_ROOT
        value: /tmp/cv_intelligence
      - key: CV_INTELLIGENCE_LLM_MODE
        value: required
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-chat-v3.1
      - key: OPENROUTER_APP_NAME
        value: CestaCV Intelligence Studio
      - key: OPENROUTER_API_KEY
        sync: false
